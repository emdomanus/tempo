[package]
name = "emdomanus/tempo"
description = "A low-overhead phase-aware scheduler for Roblox."
version = "0.1.0"
license = "MIT"
authors = ["emdomanus"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
include = ["src", "wally.toml", "default.project.json", "README.md", "LICENSE"]
exclude = [
	"Packages",
	"Packages/**",
	"aftman.toml",
	"selene.toml",
	"stylua.toml",
	"scripts",
	"scripts/**",
	".vscode",
	".vscode/**",
	"dev",
	"dev/**",
	"dev.project.json",
	"dev-sourcemap.json",
	"tempo-dev.rbxlx",
	"tempo-package.tar.gz",
	"sourcemap.json",
	"*.rbxm",
	"*.rbxmx",
	"*.rbxlx",
	"*.tar.gz",
]

[dependencies]
hook = "emdomanus/hook@0.1.0"
